<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="table.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style></style>
</head>
<body><div class="container">
    <a href='{% url 'create_task' %}'> Crear Tarea</a>
    <h2>Lista tareas</h2>
        
        <table class="table table-striped table-bordered text-center table-hover">
    <thead class="table-dark">
        <tr>
        <th>Id</th>
        <th>Título</th>
        <th>Completada</th>
        <th>Fecha Creación</th>
        <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for task in tasks %}
        <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ task.title }}</td>
        <td>{% if task.completed %}✅{% else %}❌{% endif %}</td>
        <td>{{ task.created_at|date:"d/m/Y" }}</td>
        <td><l1>
            <a href='{% url 'update_task' task.id %}'>  Actualizar Tarea  </a> |
            <a href='{% url 'delete_task' task.id %}'>Eliminar Tarea</a> 
        </l1></td>
        </tr> 
        
        {% endfor %}

    </tbody>
</table>
</div>
</body>
</html>
